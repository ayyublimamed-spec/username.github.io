<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY BRAND</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
transition:0.4s;
overflow-x:hidden;
}

.dark{
background:#111;
}

.container{
max-width:520px;
margin:auto;
padding:25px 18px;
animation:fadeIn 1.5s;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:15px;
animation:slideDown 1.2s;
}

.card{
background:rgba(255,255,255,0.18);
padding:18px;
border-radius:16px;
margin:15px 0;
animation:up 1s;
}

.btn,a{
display:block;
width:100%;
margin:10px auto;
padding:16px;
font-size:20px;
font-weight:bold;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.18);
border:none;
border-radius:14px;
cursor:pointer;
transition:0.3s;
animation:up 1.2s;
}

.btn:hover,a:hover{
transform:scale(1.04);
background:rgba(255,255,255,0.28);
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
}

.comment{
background:rgba(255,255,255,0.12);
padding:10px;
margin-top:10px;
border-radius:10px;
text-align:left;
animation:fadeIn 0.6s;
}

img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-top:10px;
animation:pulse 2s infinite;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideDown{
from{transform:translateY(-40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@keyframes up{
from{transform:translateY(30px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 MY BRAND</div>

<a href="study.html">📚 Учёба</a>
<a href="tips.html">💡 Советы</a>
<a href="life.html">🔥 Лайфхаки</a>

<div class="card">
👤 Профиль  
<p id="user">Гость</p>
<input type="text" id="name" placeholder="Введите имя">
<button class="btn" onclick="saveName()">Сохранить имя</button>

<input type="file" id="avatar" accept="image/*" onchange="loadAvatar()">
<img id="photo" src="">
</div>

<div class="card">
💬 Комментарии
<input type="text" id="commentText" placeholder="Написать комментарий">
<button class="btn" onclick="addComment()">Отправить</button>
<div id="comments"></div>
</div>

<div class="card">
👥 Подписчики: <span id="subs">0</span>
<button class="btn" onclick="subscribe()">Подписаться</button>
</div>

<div class="card">
👀 Онлайн сейчас: <span id="online"></span>
</div>

<button class="btn" onclick="toggleTheme()">🌙 Тёмная тема</button>

</div>

<script>
function saveName(){
let name=document.getElementById("name").value;
localStorage.setItem("username",name);
document.getElementById("user").innerText=name;
}

function addComment(){
let text=document.getElementById("commentText").value;
if(text!=""){
let comments=JSON.parse(localStorage.getItem("comments"))||[];
comments.push(text);
localStorage.setItem("comments",JSON.stringify(comments));
showComments();
document.getElementById("commentText").value="";
}
}

function showComments(){
let comments=JSON.parse(localStorage.getItem("comments"))||[];
let box=document.getElementById("comments");
box.innerHTML="";
comments.forEach(c=>{
box.innerHTML+=`<div class="comment">${c}</div>`;
});
}

function subscribe(){
let n=parseInt(localStorage.getItem("subs"))||0;
n++;
localStorage.setItem("subs",n);
document.getElementById("subs").innerText=n;
}

function toggleTheme(){
document.body.classList.toggle("dark");
localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");
}

function loadAvatar(){
let file=document.getElementById("avatar").files[0];
let reader=new FileReader();
reader.onload=function(){
localStorage.setItem("avatar",reader.result);
document.getElementById("photo").src=reader.result;
}
reader.readAsDataURL(file);
}

window.onload=function(){
document.getElementById("user").innerText=
localStorage.getItem("username")||"Гость";

document.getElementById("subs").innerText=
localStorage.getItem("subs")||0;

if(localStorage.getItem("theme")=="dark"){
document.body.classList.add("dark");
}

document.getElementById("photo").src=
localStorage.getItem("avatar")||"";

document.getElementById("online").innerText=
Math.floor(Math.random()*20)+5;

showComments();
}
</script>

</body>
</html>
