<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Brand</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
transition:0.4s;
}

.dark{
background:#111;
color:white;
}

.container{
padding:30px 20px;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
display:block;
width:80%;
max-width:320px;
margin:12px auto;
padding:18px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.18);
border-radius:15px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.card{
background:rgba(255,255,255,0.18);
margin:20px auto;
padding:20px;
border-radius:18px;
max-width:350px;
}

.chat{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,0.18);
border-radius:15px;
max-width:350px;
margin-left:auto;
margin-right:auto;
}

.theme{
margin-top:20px;
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

footer{
margin-top:30px;
padding-bottom:30px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 MY BRAND</div>

<p>Добро пожаловать на мой топ сайт</p>

<a href="study.html" class="btn">📚 Учёба</a>
<a href="tips.html" class="btn">💡 Советы</a>
<a href="life.html" class="btn">🔥 Лайфхаки</a>

<div class="card">
🔥 Сегодня новость: сайт обновлён до суперуровня!
</div>

<div class="card">
👀 Сейчас онлайн: 7 человек
</div>

<div class="chat">
💬 Чат скоро будет доступен...
</div>

<button class="theme" onclick="document.body.classList.toggle('dark')">
🌙 Тёмная тема
</button>

<footer>
Сделано мной 😎
</footer>

</div>

</body>
</html>
