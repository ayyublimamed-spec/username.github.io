<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY BRAND</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
transition:0.4s;
}

.dark{
background:#111;
}

.container{
padding:25px 18px;
max-width:500px;
margin:auto;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
margin-bottom:25px;
opacity:0.9;
}

.btn{
display:block;
width:100%;
margin:12px auto;
padding:18px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.18);
border-radius:16px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
}

.card{
background:rgba(255,255,255,0.18);
padding:18px;
border-radius:16px;
margin:15px 0;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

.smallbtn{
margin-top:12px;
padding:12px 18px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.comment{
background:rgba(255,255,255,0.12);
padding:10px;
margin-top:10px;
border-radius:10px;
text-align:left;
}

footer{
margin:25px 0;
font-size:16px;
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 MY BRAND</div>
<div class="subtitle">Современный личный сайт</div>

<a href="study.html" class="btn">📚 Учёба</a>
<a href="tips.html" class="btn">💡 Советы</a>
<a href="life.html" class="btn">🔥 Лайфхаки</a>

<div class="card">
👤 Личный кабинет  
<p id="user">Гость</p>
<input type="text" id="name" placeholder="Введите имя">
<button class="smallbtn" onclick="login()">Войти</button>
</div>

<div class="card">
💬 Комментарии
<input type="text" id="commentText" placeholder="Написать комментарий">
<button class="smallbtn" onclick="addComment()">Отправить</button>
<div id="comments"></div>
</div>

<div class="card">
👥 Подписчики: <span id="subs">128</span><br><br>
<button class="smallbtn" onclick="subscribe()">Подписаться</button>
</div>

<div class="card">
📢 Реклама  
Здесь может быть ваш баннер
</div>

<div class="card">
👀 Онлайн сейчас: <span id="online"></span>
</div>

<button class="smallbtn" onclick="document.body.classList.toggle('dark')">
🌙 Тёмная тема
</button>

<footer>
Создано мной 😎
</footer>

</div>

<script>
function login(){
let name=document.getElementById("name").value;
if(name!=""){
document.getElementById("user").innerText=name;
}
}

function addComment(){
let text=document.getElementById("commentText").value;
if(text!=""){
let div=document.createElement("div");
div.className="comment";
div.innerText=text;
document.getElementById("comments").appendChild(div);
document.getElementById("commentText").value="";
}
}

function subscribe(){
let count=document.getElementById("subs");
count.innerText=parseInt(count.innerText)+1;
}

document.getElementById("online").innerText=Math.floor(Math.random()*20)+3;
</script>

</body>
</html>
