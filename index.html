<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY BRAND</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
padding:20px;
text-align:center;
transition:0.4s;
user-select:none;
}

.dark{
background:#111 !important;
color:white;
}

.container{
max-width:520px;
margin:auto;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.18);
padding:18px;
border-radius:16px;
margin:15px 0;
backdrop-filter:blur(8px);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

textarea{
height:90px;
resize:none;
}

button,a{
display:block;
width:100%;
margin-top:10px;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:rgba(255,255,255,0.18);
color:white;
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.30);
transform:scale(1.02);
}

.post,.chatmsg{
background:rgba(255,255,255,0.14);
padding:12px;
border-radius:12px;
margin-top:10px;
text-align:left;
word-break:break-word;
}

.small{
font-size:14px;
opacity:0.8;
margin-top:6px;
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 MY BRAND</div>

<div class="card">
<h2>🔐 Вход</h2>
<input type="text" id="name" placeholder="Введите имя">
<button onclick="login()">Войти</button>
<p id="user">Гость</p>
</div>

<div class="card">
<h2>📝 Посты</h2>
<textarea id="postText" placeholder="Что нового?"></textarea>
<button onclick="addPost()">Опубликовать</button>
<div id="posts"></div>
</div>

<div class="card">
<h2>💬 Чат</h2>
<input type="text" id="chatInput" placeholder="Сообщение">
<button onclick="sendMsg()">Отправить</button>
<div id="chat"></div>
</div>

<div class="card">
<h2>👥 Подписчики</h2>
<p><span id="subs">0</span></p>
<button onclick="sub()">Подписаться</button>
</div>

<div class="card">
<h2>👀 Онлайн</h2>
<p id="online">0 пользователей</p>
</div>

<div class="card">
<h2>⚙️ Настройки</h2>
<button onclick="theme()">🌙 Тёмный режим</button>
</div>

<div class="card">
<h2>📚 Разделы</h2>

<a href="life.html">
<button>🔥 Лайфхаки</button>
</a>

<a href="tips.html">
<button>💡 Советы</button>
</a>

<a href="study.html">
<button>📖 Учёба</button>
</a>

</div>

<div class="footer">
MY BRAND © 2026
</div>

</div>

<script src="script.js"></script>

</body>
</html>
