<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY BRAND</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
padding:20px;
text-align:center;
transition:0.4s;
}

.dark{background:#111;}

.container{
max-width:540px;
margin:auto;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:20px;
animation:fade 1s;
}

.card{
background:rgba(255,255,255,0.18);
padding:18px;
border-radius:16px;
margin:15px 0;
animation:up 0.8s;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

textarea{height:90px;resize:none;}

button,a{
width:100%;
display:block;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.18);
}

.post{
background:rgba(255,255,255,0.14);
padding:15px;
border-radius:14px;
margin-top:12px;
text-align:left;
}

.comment{
background:rgba(255,255,255,0.10);
padding:8px;
border-radius:10px;
margin-top:8px;
}

.chatmsg{
background:rgba(255,255,255,0.14);
padding:10px;
border-radius:12px;
margin-top:8px;
text-align:left;
}

.small{font-size:14px;opacity:0.8;margin-top:8px;}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes up{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 MY BRAND</div>

<div class="card">
<h2>🔐 Регистрация / Вход</h2>
<input type="text" id="name" placeholder="Имя">
<input type="password" id="pass" placeholder="Пароль">
<button onclick="login()">Войти</button>
<p id="user">Гость</p>
</div>

<div class="card">
<h2>📸 Создать пост</h2>
<textarea id="postText" placeholder="Что нового?"></textarea>
<button onclick="addPost()">Опубликовать</button>
<div id="posts"></div>
</div>

<div class="card">
<h2>💬 Чат</h2>
<input type="text" id="chatInput" placeholder="Сообщение">
<button onclick="sendMsg()">Отправить</button>
<div id="chat"></div>
</div>

<div class="card">
<h2>🛠 Админ-панель</h2>
<button onclick="clearPosts()">Удалить посты</button>
<button onclick="clearChat()">Очистить чат</button>
</div>

<div class="card">
<h2>👥 Подписчики</h2>
<p><span id="subs">0</span></p>
<button onclick="sub()">Подписаться</button>
</div>

<div class="card">
<h2>📢 Реклама</h2>
<p>Здесь может быть ваша реклама</p>
</div>

<div class="card">
<h2>👀 Онлайн</h2>
<p id="online"></p>
</div>

<button onclick="theme()">🌙 Тёмная тема</button>

</div>

<script>
let posts=JSON.parse(localStorage.getItem("posts"))||[];
let chat=JSON.parse(localStorage.getItem("chat"))||[];

function login(){
let n=document.getElementById("name").value||"Гость";
localStorage.setItem("user",n);
document.getElementById("user").innerText=n;
}

function addPost(){
let t=document.getElementById("postText").value;
if(t!=""){
posts.unshift(t);
localStorage.setItem("posts",JSON.stringify(posts));
showPosts();
document.getElementById("postText").value="";
}
}

function showPosts(){
let box=document.getElementById("posts");
box.innerHTML="";
posts.forEach(p=>{
box.innerHTML+=`<div class="post">${p}<div class="small">❤️ 0 лайков</div></div>`;
});
}

function sendMsg(){
let t=document.getElementById("chatInput").value;
if(t!=""){
chat.push(t);
localStorage.setItem("chat",JSON.stringify(chat));
showChat();
document.getElementById("chatInput").value="";
}
}

function showChat(){
let box=document.getElementById("chat");
box.innerHTML="";
chat.forEach(m=>{
box.innerHTML+=`<div class="chatmsg">${m}</div>`;
});
}

function clearPosts(){
posts=[];
localStorage.setItem("posts","[]");
showPosts();
}

function clearChat(){
chat=[];
localStorage.setItem("chat","[]");
showChat();
}

function sub(){
let s=parseInt(localStorage.getItem("subs"))||0;
s++;
localStorage.setItem("subs",s);
document.getElementById("subs").innerText=s;
}

function theme(){
document.body.classList.toggle("dark");
}

window.onload=function(){
document.getElementById("user").innerText=localStorage.getItem("user")||"Гость";
document.getElementById("subs").innerText=localStorage.getItem("subs")||0;
document.getElementById("online").innerText=Math.floor(Math.random()*25)+5+" пользователей";
showPosts();
showChat();
}
</script>

</body>
     </html>
